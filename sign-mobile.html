<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign on Phone</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, sans-serif;
  background: #111;
  color: #ccc;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

/* ---- Status bar ---- */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  background: #1a1a1a;
  border-bottom: 1px solid #333;
  flex-shrink: 0;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #999;
  flex-shrink: 0;
}

.status-dot.connecting { background: #f59e0b; animation: pulse 1.5s infinite; }
.status-dot.connected { background: #16a34a; }
.status-dot.sending { background: #2563eb; animation: pulse 1s infinite; }
.status-dot.sent { background: #16a34a; }
.status-dot.error { background: #e94560; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ---- Title ---- */
.title {
  text-align: center;
  padding: 8px 16px 6px;
  flex-shrink: 0;
}

.title h2 {
  font-size: 17px;
  color: #fff;
}

.title p {
  font-size: 12px;
  color: #777;
  margin-top: 4px;
}

/* ---- Canvas ---- */
.canvas-wrap {
  flex: 1;
  margin: 0 12px;
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  min-height: 0;
}

.canvas-wrap canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.canvas-wrap .placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  color: #bbb;
  font-size: 15px;
}

.canvas-wrap .placeholder.hidden { display: none; }

/* ---- Toolbar ---- */
.toolbar {
  padding: 8px 16px;
  flex-shrink: 0;
}

.color-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 6px;
}

.color-row span {
  font-size: 12px;
  color: #888;
}

.color-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: .15s;
}

.color-dot.active {
  border-color: #fff;
  box-shadow: 0 0 0 2px rgba(255,255,255,.25);
}

.width-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 8px;
}

.width-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: #222;
  border: 1px solid #444;
  cursor: pointer;
}

.width-btn.active {
  border-color: #e94560;
  background: #2a1a1e;
}

.width-btn .dot {
  border-radius: 50%;
  background: #ccc;
}

.btn-row {
  display: flex;
  gap: 8px;
}

.btn-row button {
  flex: 1;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  border: 1px solid #444;
  border-radius: 8px;
  background: #222;
  color: #ccc;
  cursor: pointer;
  min-height: 48px;
}

.btn-row button:active { background: #333; }

.btn-row button.accent {
  background: #e94560;
  color: #fff;
  border-color: #e94560;
}

.btn-row button.accent:active { background: #c73e54; }

.btn-row button:disabled {
  opacity: .35;
  pointer-events: none;
}

/* ---- Error page ---- */
.error-page {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 32px;
  text-align: center;
}

.error-page.on { display: flex; }

.error-page h2 {
  color: #e94560;
  margin-bottom: 10px;
}

.error-page p {
  color: #888;
  font-size: 14px;
  margin-bottom: 20px;
}

.error-page button {
  padding: 12px 28px;
  font-size: 15px;
  font-weight: 600;
  border: 1px solid #444;
  border-radius: 8px;
  background: #222;
  color: #ccc;
  cursor: pointer;
}

/* ---- Success overlay ---- */
.success-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.success-overlay.on { display: flex; }

.success-overlay .checkmark {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #16a34a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin-bottom: 16px;
}

.success-overlay p {
  font-size: 16px;
  color: #fff;
}

.success-overlay .sub {
  font-size: 13px;
  color: #888;
  margin-top: 6px;
}
</style>
</head>
<body>

<div class="status-bar">
  <div class="status-dot connecting" id="statusDot"></div>
  <span id="statusText">Connecting...</span>
</div>

<div class="error-page" id="errorPage">
  <h2>Connection Error</h2>
  <p id="errorMsg">Could not connect to the desktop app.</p>
  <button onclick="retry()">Retry</button>
</div>

<div class="title" id="mainUI">
  <h2>Draw your signature</h2>
  <p>Sign below, then tap Submit</p>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <div class="placeholder" id="placeholder">Draw here</div>
  <canvas id="sigCanvas"></canvas>
</div>

<div class="toolbar" id="toolbar">
  <div class="color-row">
    <span>Color:</span>
    <div class="color-dot active" style="background:#222" onclick="setColor('#222',this)"></div>
    <div class="color-dot" style="background:#e94560" onclick="setColor('#e94560',this)"></div>
    <div class="color-dot" style="background:#2563eb" onclick="setColor('#2563eb',this)"></div>
    <div class="color-dot" style="background:#16a34a" onclick="setColor('#16a34a',this)"></div>
  </div>
  <div class="width-row">
    <div class="width-btn active" onclick="setWidth(2.5,this)"><div class="dot" style="width:5px;height:5px"></div></div>
    <div class="width-btn" onclick="setWidth(4,this)"><div class="dot" style="width:8px;height:8px"></div></div>
    <div class="width-btn" onclick="setWidth(7,this)"><div class="dot" style="width:12px;height:12px"></div></div>
  </div>
  <div class="btn-row">
    <button onclick="clearCanvas()">Clear</button>
    <button class="accent" id="btnSubmit" disabled onclick="submit()">Submit</button>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="checkmark">&#10003;</div>
  <p>Signature sent!</p>
  <p class="sub">You can close this page</p>
</div>

<script>
// ---- Peer connection ----
const params = new URLSearchParams(window.location.search);
const hostPeerId = params.get('peerId');

const iceConfig = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
  ]
};
let peer = null, conn = null;
let retries = 0;
const MAX_RETRIES = 3;

if (!hostPeerId) {
  showError('Invalid link. Please scan the QR code from the desktop app.');
} else {
  connect();
}

function connect() {
  setStatus('connecting', 'Connecting...');
  peer = new Peer({ config: iceConfig });

  peer.on('open', () => {
    conn = peer.connect(hostPeerId);

    // Timeout if data channel doesn't open
    const connTimeout = setTimeout(() => {
      if (!conn || !conn.open) {
        setStatus('error', 'Could not connect. Ensure desktop modal is open and retry.');
      }
    }, 10000);

    conn.on('open', () => {
      clearTimeout(connTimeout);
      retries = 0;
      setStatus('connected', 'Connected');
      updateSubmitBtn();
    });

    conn.on('data', raw => {
      try {
        const msg = JSON.parse(raw);
        if (msg.type === 'ack') {
          document.getElementById('successOverlay').classList.add('on');
        }
      } catch (e) {}
    });

    conn.on('close', () => {
      setStatus('error', 'Connection lost');
    });

    conn.on('error', () => {
      setStatus('error', 'Connection error');
    });
  });

  peer.on('error', err => {
    if (err.type === 'peer-unavailable') {
      showError('Desktop session expired. Please generate a new QR code.');
    } else if (err.type === 'network') {
      if (retries < MAX_RETRIES) {
        retries++;
        setStatus('connecting', 'Reconnecting (' + retries + '/' + MAX_RETRIES + ')...');
        setTimeout(() => { cleanup(); connect(); }, 2000);
      } else {
        showError('Network error. Check your connection and try again.');
      }
    } else {
      showError('Connection failed. Please try again.');
    }
  });
}

function retry() {
  document.getElementById('errorPage').classList.remove('on');
  document.getElementById('mainUI').style.display = '';
  document.getElementById('canvasWrap').style.display = '';
  document.getElementById('toolbar').style.display = '';
  retries = 0;
  cleanup();
  connect();
}

function cleanup() {
  if (conn) { try { conn.close(); } catch(e) {} conn = null; }
  if (peer) { try { peer.destroy(); } catch(e) {} peer = null; }
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorPage').classList.add('on');
  document.getElementById('mainUI').style.display = 'none';
  document.getElementById('canvasWrap').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = text;
}

// ---- Canvas drawing ----
const canvas = document.getElementById('sigCanvas');
const ctx = canvas.getContext('2d');
let drawing = false, hasDrawn = false;
let currentColor = '#222', currentWidth = 2.5;

function initCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = currentWidth;
}

// Resize on orientation change
window.addEventListener('resize', () => {
  // Save current drawing
  const dataUrl = hasDrawn ? canvas.toDataURL() : null;
  initCanvas();
  if (dataUrl) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = currentWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    };
    img.src = dataUrl;
  }
});

setTimeout(initCanvas, 50);

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  drawing = true;
  hasDrawn = true;
  document.getElementById('placeholder').classList.add('hidden');
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}, { passive: false });

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}, { passive: false });

canvas.addEventListener('pointerup', () => { drawing = false; updateSubmitBtn(); });
canvas.addEventListener('pointerleave', () => { drawing = false; });

// Prevent scrolling on touch
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

function setColor(color, dot) {
  currentColor = color;
  ctx.strokeStyle = color;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  dot.classList.add('active');
  // Recolor existing drawing
  if (hasDrawn) {
    ctx.save();
    ctx.globalCompositeOperation = 'source-in';
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }
}

function setWidth(w, btn) {
  currentWidth = w;
  ctx.lineWidth = w;
  document.querySelectorAll('.width-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasDrawn = false;
  document.getElementById('placeholder').classList.remove('hidden');
  updateSubmitBtn();
}

function updateSubmitBtn() {
  document.getElementById('btnSubmit').disabled = !(hasDrawn && conn && conn.open);
}

// ---- Crop & Submit ----
function cropCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width, h = canvas.height;
  const d = ctx.getImageData(0, 0, w, h).data;
  let x0 = w, y0 = h, x1 = 0, y1 = 0;
  for (let y = 0; y < h; y++)
    for (let x = 0; x < w; x++)
      if (d[(y * w + x) * 4 + 3] > 10) {
        x0 = Math.min(x0, x); y0 = Math.min(y0, y);
        x1 = Math.max(x1, x); y1 = Math.max(y1, y);
      }
  if (x1 <= x0) return null;
  const p = 10 * dpr;
  x0 = Math.max(0, x0 - p); y0 = Math.max(0, y0 - p);
  x1 = Math.min(w, x1 + p); y1 = Math.min(h, y1 + p);
  const crop = document.createElement('canvas');
  crop.width = x1 - x0; crop.height = y1 - y0;
  crop.getContext('2d').drawImage(canvas, x0, y0, crop.width, crop.height, 0, 0, crop.width, crop.height);
  return crop.toDataURL('image/png');
}

function submit() {
  if (!conn || !conn.open) return;
  const url = cropCanvas();
  if (!url) return;

  setStatus('sending', 'Sending signature...');
  document.getElementById('btnSubmit').disabled = true;

  try {
    conn.send(JSON.stringify({ type: 'signature', dataUrl: url }));
  } catch (e) {
    setStatus('error', 'Failed to send');
    document.getElementById('btnSubmit').disabled = false;
    return;
  }

  // Timeout fallback if no ack received
  setTimeout(() => {
    if (!document.getElementById('successOverlay').classList.contains('on')) {
      document.getElementById('successOverlay').classList.add('on');
    }
  }, 5000);
}

window.addEventListener('beforeunload', cleanup);
</script>
</body>
</html>
